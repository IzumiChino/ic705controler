name: Android CI

on:
  push:
    branches: [master, main, security-fix-v2, 'security-fix/**']
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Assemble Debug & Release (CI-signed)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      # 避免 Gradle daemon 超时；CI 上启用 parallel + build cache
      GRADLE_OPTS: >-
        -Dorg.gradle.jvmargs=-Xmx4g
        -Dorg.gradle.parallel=true
        -Dorg.gradle.caching=true
        -Dorg.gradle.daemon=false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # AGP 9.0 + Gradle 9.x 需要 JDK 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          # Gradle wrapper 已固定到 9.1.0，这里共享远程缓存
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      # compileSdk 36 对应 Android 16 平台。setup-android 默认会从项目读取
      # compileSdk 自动安装匹配的平台与 build-tools，不需要再传 packages。
      # 之前显式传 `tools` 在新版 cmdline-tools 中已废弃，会让 sdkmanager
      # 退出码 1，导致整个 step 失败。
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Print toolchain info
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          java -version
          ./gradlew --version

      # AGP 9.0 不再为没有显式 signingConfig 的 release build 回退 debug
      # keystore，所以 packageRelease 会以
      #   SigningConfig "release" is missing required property "storeFile"
      # 失败。CI 里临时生成一把 keystore 注入给 release build；keystore
      # 文件和密码都只存在于本次 runner 实例，产物 APK 仅供 CI 验证，不
      # 能用于发布到商店。
      - name: Generate ephemeral signing key
        run: |
          keytool -genkeypair \
            -alias ciRelease \
            -keyalg RSA \
            -keysize 2048 \
            -validity 36500 \
            -storetype PKCS12 \
            -keystore "$RUNNER_TEMP/ci-release.p12" \
            -storepass ci-release-pass \
            -keypass ci-release-pass \
            -dname "CN=CI Build, OU=ic705controler, O=IzumiChino, C=US"

      - name: Assemble Debug
        run: ./gradlew :app:assembleDebug --stacktrace --no-daemon

      - name: Assemble Release (CI-signed)
        run: |
          ./gradlew :app:assembleRelease --stacktrace --no-daemon \
            "-Pandroid.injected.signing.store.file=$RUNNER_TEMP/ci-release.p12" \
            -Pandroid.injected.signing.store.password=ci-release-pass \
            -Pandroid.injected.signing.key.alias=ciRelease \
            -Pandroid.injected.signing.key.password=ci-release-pass

      - name: Collect APKs
        run: |
          mkdir -p artifacts
          find app/build/outputs/apk -type f -name '*.apk' -print -exec cp {} artifacts/ \;
          ls -lh artifacts

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ic705-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload release APK (CI-signed)
        uses: actions/upload-artifact@v4
        with:
          name: ic705-release-apk-ci-signed
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload all APKs (fallback)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ic705-all-apks
          path: artifacts/
          if-no-files-found: warn
          retention-days: 30

  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GRADLE_OPTS: >-
        -Dorg.gradle.jvmargs=-Xmx4g
        -Dorg.gradle.parallel=true
        -Dorg.gradle.caching=true
        -Dorg.gradle.daemon=false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Run Android Lint (debug)
        # 不让 lint 错误阻塞 CI（当前仓库基线尚未清零），但保留报告产物
        run: ./gradlew :app:lintDebug --stacktrace --no-daemon || true

      - name: Run Unit Tests
        run: ./gradlew :app:testDebugUnitTest --stacktrace --no-daemon

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: |
            app/build/reports/lint-results-*.html
            app/build/reports/lint-results-*.xml
          if-no-files-found: warn
          retention-days: 14

      - name: Upload unit test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: app/build/reports/tests/
          if-no-files-found: warn
          retention-days: 14
