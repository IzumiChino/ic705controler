name: Android Beta

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-beta:
    name: Build signed beta APK and publish pre-release
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create GitHub Releases

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant gradlew execute permission
        run: chmod +x gradlew

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > "${{ runner.temp }}/release.keystore"

      - name: Build signed beta APK
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleBeta

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: beta-apk
          path: app/build/outputs/apk/beta/*.apk
          retention-days: 30

      - name: Create or update beta pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: beta-latest
          name: Beta (latest main)
          prerelease: true
          files: app/build/outputs/apk/beta/*.apk
          generate_release_notes: true
          make_latest: false
